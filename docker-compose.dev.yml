# ─── Entorno de DESARROLLO — PostgreSQL local ────────────────────────────────
#
# BD:  PostgreSQL local (sin Supabase BD). Los datos persisten en un volumen Docker.
# Auth: Supabase Auth cloud (SUPABASE_URL y SUPABASE_SERVICE_ROLE_KEY del .env).
#
# Comandos:
#   pnpm dev          → docker compose -f docker-compose.dev.yml up
#   pnpm dev:build    → docker compose -f docker-compose.dev.yml up --build
#   pnpm stop         → docker compose -f docker-compose.dev.yml down
#   pnpm shell        → docker exec -it smartbite-app-dev sh
#
# Primera vez: pnpm dev (Prisma aplica las migrations automáticamente).
# No hay db:baseline ni supabase-setup.sql en este entorno.
# ─────────────────────────────────────────────────────────────────────────────

services:
  postgres:
    image: postgres:17-alpine
    container_name: smartbite-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: smartbite
      POSTGRES_PASSWORD: smartbite
      POSTGRES_DB: smartbite_dev
    ports:
      - "5433:5432"
    volumes:
      - postgres-dev-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartbite -d smartbite_dev"]
      interval: 5s
      timeout: 3s
      retries: 10

  app-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    container_name: smartbite-app-dev
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
      - "9229:9229"
    environment:
      # BD local — sobreescriben cualquier valor del .env
      DATABASE_URL: postgresql://smartbite:smartbite@postgres:5432/smartbite_dev?schema=public
      DIRECT_URL: postgresql://smartbite:smartbite@postgres:5432/smartbite_dev?schema=public
      NODE_ENV: development
      PORT: ${PORT:-3000}
      # Supabase Auth (solo autenticación, no BD)
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      CORS_ORIGIN: ${CORS_ORIGIN}
      # Claude API (opcional)
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-6}
      CLAUDE_TIMEOUT_INTERACTIVE: ${CLAUDE_TIMEOUT_INTERACTIVE:-10000}
      CLAUDE_TIMEOUT_BATCH: ${CLAUDE_TIMEOUT_BATCH:-30000}
      # Groq Whisper (opcional)
      GROQ_API_KEY: ${GROQ_API_KEY}
      GROQ_WHISPER_MODEL: ${GROQ_WHISPER_MODEL:-whisper-large-v3-turbo}
      GROQ_TIMEOUT: ${GROQ_TIMEOUT:-15000}
    volumes:
      - ./src:/app/src
      - ./prisma:/app/prisma
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "
        echo '[SmartBite] Generando cliente Prisma...' &&
        pnpm prisma generate &&
        echo '[SmartBite] Aplicando migraciones...' &&
        pnpm prisma migrate deploy &&
        echo '[SmartBite] Aplicando vistas, permisos e índices (idempotente)...' &&
        pnpm prisma db execute --file prisma/sql/01_views.sql &&
        pnpm prisma db execute --file prisma/sql/02_roles.sql &&
        pnpm prisma db execute --file prisma/sql/03_indexes.sql &&
        echo '[SmartBite] Listo. Iniciando servidor...' &&
        pnpm run start:dev
      "

volumes:
  postgres-dev-data:
