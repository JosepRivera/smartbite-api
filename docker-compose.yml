services:
  postgres:
    image: postgres:17-alpine
    container_name: smartbite-postgres-dev
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      # initdb.d vacío — ningún script nuestro va aquí.
      # Los 3 sql se ejecutan post-migración desde el command del app-dev.
    networks:
      - smartbite-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

  app-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    container_name: smartbite-app-dev
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
      - "9229:9229"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      NODE_ENV: ${NODE_ENV}
      PORT: ${PORT}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_TOKEN_TTL: ${JWT_ACCESS_TOKEN_TTL}
      JWT_REFRESH_TOKEN_TTL: ${JWT_REFRESH_TOKEN_TTL}
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS}
      CORS_ORIGIN: ${CORS_ORIGIN}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-6}
      CLAUDE_TIMEOUT_INTERACTIVE: ${CLAUDE_TIMEOUT_INTERACTIVE:-10000}
      CLAUDE_TIMEOUT_BATCH: ${CLAUDE_TIMEOUT_BATCH:-30000}
      GROQ_API_KEY: ${GROQ_API_KEY}
      GROQ_WHISPER_MODEL: ${GROQ_WHISPER_MODEL:-whisper-large-v3-turbo}
      GROQ_TIMEOUT: ${GROQ_TIMEOUT:-15000}
    volumes:
      - ./src:/app/src
      - ./prisma:/app/prisma
      - ./generated:/app/generated
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - smartbite-network
    command: >
      sh -c "
        echo '[SmartBite] Aplicando migraciones...' &&
        pnpm prisma migrate deploy &&
        echo '[SmartBite] Generando cliente...' &&
        pnpm prisma generate &&
        echo '[SmartBite] Aplicando vistas, permisos e índices...' &&
        pnpm prisma db execute --file prisma/sql/01_views.sql &&
        pnpm prisma db execute --file prisma/sql/02_roles.sql &&
        pnpm prisma db execute --file prisma/sql/03_indexes.sql &&
        echo '[SmartBite] Listo. Iniciando servidor...' &&
        pnpm run start:dev
      "

volumes:
  postgres_dev_data:

networks:
  smartbite-network: