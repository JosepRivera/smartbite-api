# ─── Entorno de DESARROLLO — Supabase como BD y Auth ─────────────────────────
#
# BD:   Supabase PostgreSQL (DATABASE_URL y DIRECT_URL apuntan a Supabase).
# Auth: Supabase Auth cloud.
#
# Setup inicial (solo una vez por proyecto Supabase):
#   1. Ejecutar prisma/supabase-setup.sql en el SQL Editor de Supabase
#   2. pnpm db:baseline
#
# Levantar:  docker compose up
# ─────────────────────────────────────────────────────────────────────────────

services:
  app-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    container_name: smartbite-app-dev
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
      - "9229:9229"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DIRECT_URL: ${DIRECT_URL}
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${PORT:-3000}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      CORS_ORIGIN: ${CORS_ORIGIN}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-6}
      CLAUDE_TIMEOUT_INTERACTIVE: ${CLAUDE_TIMEOUT_INTERACTIVE:-10000}
      CLAUDE_TIMEOUT_BATCH: ${CLAUDE_TIMEOUT_BATCH:-30000}
      GROQ_API_KEY: ${GROQ_API_KEY}
      GROQ_WHISPER_MODEL: ${GROQ_WHISPER_MODEL:-whisper-large-v3-turbo}
      GROQ_TIMEOUT: ${GROQ_TIMEOUT:-15000}
    volumes:
      - ./src:/app/src
      - ./prisma:/app/prisma
      - /app/node_modules
    command: >
      sh -c "
        echo '[SmartBite] Generando cliente Prisma...' &&
        pnpm prisma generate &&
        echo '[SmartBite] Aplicando migraciones...' &&
        pnpm prisma migrate deploy &&
        echo '[SmartBite] Aplicando vistas, permisos e índices (idempotente)...' &&
        pnpm prisma db execute --file prisma/sql/01_views.sql &&
        pnpm prisma db execute --file prisma/sql/02_roles.sql &&
        pnpm prisma db execute --file prisma/sql/03_indexes.sql &&
        echo '[SmartBite] Listo. Iniciando servidor...' &&
        pnpm run start:dev
      "
