project_id = "smartbite"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = ["http://127.0.0.1:3000"]
# 1 hora para dev — más cómodo que los 15 min de producción
jwt_expiry = 3600
enable_refresh_token_rotation = true
enable_anonymous_sign_ins = false

[auth.email]
enable_signup = true
# Sin confirmación de email — todos los usuarios son sintéticos @smartbite.local
enable_confirmations = false
double_confirm_changes = false

[auth.external.google]
enabled = false
