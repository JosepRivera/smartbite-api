# ─── Entorno de TESTING — PostgreSQL local aislado ───────────────────────────
#
# Levanta una BD PostgreSQL limpia solo para e2e tests.
# Se destruye con pnpm test:e2e:down.
#
# Comando: pnpm test:e2e
# ─────────────────────────────────────────────────────────────────────────────

services:
  postgres-test:
    image: postgres:17-alpine
    container_name: smartbite-postgres-test
    environment:
      POSTGRES_USER: smartbite
      POSTGRES_PASSWORD: smartbite
      POSTGRES_DB: smartbite_test
    ports:
      - "5433:5432"
    networks:
      - smartbite-test-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartbite -d smartbite_test"]
      interval: 5s
      timeout: 3s
      retries: 10

  app-test:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    container_name: smartbite-app-test
    environment:
      DATABASE_URL: postgresql://smartbite:smartbite@postgres-test:5432/smartbite_test?schema=public
      DIRECT_URL: postgresql://smartbite:smartbite@postgres-test:5432/smartbite_test?schema=public
      NODE_ENV: test
      PORT: 3001
      SUPABASE_URL: ${SUPABASE_URL:-http://localhost}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-test-service-role-key}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-6}
      GROQ_API_KEY: ${GROQ_API_KEY}
      GROQ_WHISPER_MODEL: ${GROQ_WHISPER_MODEL:-whisper-large-v3-turbo}
    volumes:
      - ./src:/app/src
      - ./prisma:/app/prisma
      - ./test:/app/test
      - /app/node_modules
    depends_on:
      postgres-test:
        condition: service_healthy
    networks:
      - smartbite-test-network
    command: >
      sh -c "
        echo '[SmartBite Test] Generando cliente Prisma...' &&
        pnpm prisma generate &&
        echo '[SmartBite Test] Aplicando migraciones...' &&
        pnpm prisma migrate deploy &&
        echo '[SmartBite Test] Aplicando vistas, permisos e índices...' &&
        pnpm prisma db execute --file prisma/sql/01_views.sql &&
        pnpm prisma db execute --file prisma/sql/02_roles.sql &&
        pnpm prisma db execute --file prisma/sql/03_indexes.sql &&
        echo '[SmartBite Test] Corriendo tests e2e...' &&
        pnpm vitest run --project e2e --reporter=verbose
      "

networks:
  smartbite-test-network:
    driver: bridge
