name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.31.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm prisma generate
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci_db

      - name: Lint (Biome)
        run: pnpm lint

      - name: Build TypeScript
        run: pnpm build
        
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint-and-build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.31.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm prisma generate
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci_db

      - name: Run unit tests
        run: pnpm test
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci_db
          JWT_SECRET: ci-secret-min-32-chars-for-ci-testing
          JWT_ACCESS_TOKEN_TTL: 15m
          JWT_REFRESH_TOKEN_TTL: 7d
          BCRYPT_ROUNDS: 4

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.31.0

      - name: Create .env for e2e
        run: |
          cat > .env << EOF
          POSTGRES_USER=smartbite
          POSTGRES_PASSWORD=smartbite
          POSTGRES_DB=smartbite_test
          JWT_SECRET=ci-secret-min-32-chars-for-ci-testing
          JWT_ACCESS_TOKEN_TTL=15m
          JWT_REFRESH_TOKEN_TTL=7d
          BCRYPT_ROUNDS=4
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY || 'sk-ant-placeholder' }}
          ANTHROPIC_MODEL=claude-sonnet-4-6
          GROQ_API_KEY=${{ secrets.GROQ_API_KEY || 'gsk_placeholder' }}
          GROQ_WHISPER_MODEL=whisper-large-v3-turbo
          EOF

      - name: Run e2e tests (Docker Compose)
        run: pnpm test:e2e

      - name: Cleanup
        if: always()
        run: pnpm test:e2e:down